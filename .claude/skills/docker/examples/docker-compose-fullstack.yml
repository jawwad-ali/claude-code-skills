# =============================================================================
# Full-Stack Development Environment: Docker Compose
# Services: API (FastAPI) + Frontend (Next.js) + PostgreSQL + Redis
#
# Usage:
#   docker compose up --build          # Start everything
#   docker compose down                # Stop everything
#   docker compose down -v             # Stop and delete data volumes
#   docker compose logs -f api         # Follow API logs
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary database with pgvector extension
  # Data persists in a named volume across container restarts
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      # Named volume for data persistence (survives docker compose down)
      - postgres_data:/var/lib/postgresql/data
      # Init scripts run on first startup when data volume is empty
      # Files execute in alphabetical order (.sql, .sql.gz, .sh supported)
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis — Cache and async job store
  # AOF persistence ensures in-flight jobs survive restarts
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Enable AOF persistence for durability
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # API — FastAPI backend
  # Waits for postgres and redis to be healthy before starting
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override env vars for container networking (service names, not localhost)
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/crm
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Development: mount source for hot-reload (remove in production)
    # volumes:
    #   - ./api:/app/api
    #   - ./agent:/app/agent

  # ---------------------------------------------------------------------------
  # Web — Next.js frontend
  # Waits for API to be healthy before starting
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: runner
      args:
        # Baked into client bundle at build time
        NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

# =============================================================================
# Named volumes — Docker manages the storage location
# Data persists across container restarts and docker compose stop/start
# Only deleted with: docker compose down -v
# =============================================================================
volumes:
  postgres_data:
    name: crm_postgres_data
  redis_data:
    name: crm_redis_data
