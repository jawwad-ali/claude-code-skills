# PostgreSQL Database — PVC + Deployment + Service
# Generic pattern for a single-replica database with persistent storage
#
# Key decisions:
# - Deployment (not StatefulSet): single replica, no clustering needed
# - strategy: Recreate: prevents two instances writing to same PVC
# - PGDATA subdirectory: avoids conflict with PVC's lost+found
# - pg_isready: native PostgreSQL health check (no curl needed)
# - secretKeyRef for password: never hardcode credentials
#
# Adapt: change image, POSTGRES_DB, storage size, resource limits for your needs

---
# PersistentVolumeClaim — data survives pod restarts and rescheduling
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  namespace: my-project
  labels:
    app: postgres
    component: database
    part-of: my-project
spec:
  accessModes:
    - ReadWriteOnce                  # Single-node write — standard for databases
  resources:
    requests:
      storage: 1Gi                   # Adjust for your data volume

---
# Deployment — single-replica database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: my-project
  labels:
    app: postgres
    component: database
    part-of: my-project
spec:
  replicas: 1                        # Never scale without consensus protocol
  strategy:
    type: Recreate                   # Kill old before creating new — no dual-write
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        component: database
        part-of: my-project
    spec:
      containers:
        - name: postgres
          image: postgres:16           # Swap for postgres:15, pgvector, timescale, etc.
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mydb              # Your database name
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_PASSWORD
            - name: PGDATA             # Subdirectory avoids lost+found conflict
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: db-pvc

---
# Service — stable internal DNS: postgres:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: my-project
  labels:
    app: postgres
    component: database
    part-of: my-project
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
