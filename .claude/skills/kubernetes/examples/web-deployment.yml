# Web Frontend Deployment + NodePort Service
# Generic pattern for a frontend (Next.js, React, Vue, etc.) exposed externally
#
# Key decisions:
# - Single replica: frontends are lightweight, rarely need HPA
# - NodePort: developer-friendly external access without Ingress controller
# - No init container: frontends typically have no database dependency
# - ConfigMap ref for API URL: backend URL injected at runtime
#
# Adapt: change image, port, nodePort, resource limits for your frontend

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web
  namespace: my-project
  labels:
    app: my-web
    component: frontend
    part-of: my-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: my-web
        component: frontend
        part-of: my-project
    spec:
      containers:
        - name: my-web
          image: my-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000        # Your frontend port
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

          env:
            - name: API_URL              # Point frontend to backend service
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: API_URL           # Must exist in your ConfigMap

      restartPolicy: Always

---
# Service — NodePort for external access
# Access via http://localhost:30000 (or your chosen nodePort)
apiVersion: v1
kind: Service
metadata:
  name: my-web
  namespace: my-project
  labels:
    app: my-web
    component: frontend
    part-of: my-project
spec:
  type: NodePort
  selector:
    app: my-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30000                  # Fixed for predictable access; omit for auto
      protocol: TCP
